environment: P1
environment_code: p1
platform_version: 2211-jdk21.9     # version you are upgrading TO
deploy_mode: no_migration_recreate  # change to migrate_data for final production migration

ccv2:
  subscription_code: <your-subscription-code>
  api_token_env: CCv2_API_TOKEN_P1

hac:
  username: admin
  password_env: HAC_PASSWORD_P1

endpoints:
  accstorefront: https://accstorefront.<subscription>-<code>-p1-public.model-t.cc.commerce.ondemand.com
  backoffice: https://backoffice.<subscription>-<code>-p1-public.model-t.cc.commerce.ondemand.com
  api: https://api.<subscription>-<code>-p1-public.model-t.cc.commerce.ondemand.com

opensearch:
  base_url: ""
  password_env: OPENSEARCH_PASSWORD_P1
  index_pattern: "logs-*"

thresholds:
  system_update_timeout_min: 180    # production may take longer (larger dataset)
  solr_reindex_timeout_min: 120     # production has more products
  pod_startup_timeout_min: 45
  build_timeout_min: 90
  deploy_timeout_min: 90

known_active_catalogs:
  # Format: <catalogId>/Online
  # Example:
  #   - electronicsProductCatalog/Online

verify_ssl: true
